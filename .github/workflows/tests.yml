name: Automated Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Unity Tests (Edit Mode)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run Edit Mode Tests (SharedSimCore)
        uses: game-ci/unity-test-runner@v4
        with:
          testMode: editmode
          artifactsPath: test-results/editmode
          unityVersion: 6000.3.0f1

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-editmode
          path: test-results/editmode/

  determinism-spike:
    name: ADR-0002 Determinism Spike (iOS ARM64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build for iOS (ARM64 IL2CPP)
        uses: game-ci/unity-builder@v4
        with:
          unityVersion: 6000.3.0f1
          targetPlatform: iOS
          buildMethod: Assets/Scripts/SharedSimCore/BuildDeterminismTest.cs

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-arm64-determinism
          path: build/iOS/
